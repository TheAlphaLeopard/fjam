/* ── .JAM loader ────────────────────────────────────────────── */

const base=bde.includes('/')?bde.substring(0,bde.lastIndexOf('/')+1):'';
for(const p in unz){if(p.endsWith('/')||p.includes('__MACOSX')||p.endsWith('.DS_Store'))continue;
const cp=p.replace(/\\/g,'/').replace(/^\/+/,''),type=mime(cp);
const url=URL.createObjectURL(new Blob([unz[p]],{type}));
revMap.set(url,cp);urlMap.set(cp,url);urlMap.set('/'+cp,url);urlMap.set('./'+cp,url);
if(cp.startsWith(base)){const rel=cp.substring(base.length);urlMap.set(rel,url);urlMap.set('/'+rel,url);urlMap.set('./'+rel,url);urlMap.set(rel+'.part1',url);}
const fn=cp.split('/').pop();urlMap.set(fn,url);urlMap.set('./'+fn,url);urlMap.set('/'+fn,url);
urlMap.set(cp+'.part1',url);urlMap.set(fn+'.part1',url);

unz[p]=null;}
boot(urlMap,revMap,imap,base);
}catch(e){console.error(e);pending=pick;show();}}

const inject='<script type="importmap">'+JSON.stringify(imap)+'</'+'script><script>'+rt+'</'+'script>';
const hi=html.toLowerCase().indexOf('<head>');

});}

/* ── Persistence & file picking ─────────────────────────────── */
const el=document.getElementById('h'),FSA='showOpenFilePicker'in window;
let pending=null;

function show(){setTimeout(()=>el.classList.add('show'),350);}

async function pick(){
  if(FSA){
    try{
      const[handle]=await showOpenFilePicker({
        types:[{description:'JAM',accept:{'application/octet-stream':['.jam']}}],
        multiple:false
      });
      await DB.put('handle',handle);
      openJam(await handle.getFile());
    }catch(e){
      /* picker cancelled or failed — re-enable */
      pending=pick;show();
    }
  }else{
    const inp=document.createElement('input');inp.type='file';inp.accept='.jam';
    inp.onchange=async()=>{
      const f=inp.files[0];if(!f){pending=pick;show();return;}
      await DB.put('buf',await f.arrayBuffer());
      await DB.put('name',f.name);
      openJam(f);
    };
    inp.addEventListener('cancel',()=>{pending=pick;show();});
    inp.click();
  }
}

async function init(){
  /* 1 — Try persisted File System Access handle (always reads latest from disk) */
  if(FSA){
    const handle=await DB.get('handle');
    if(handle) try{
      if(await handle.queryPermission({mode:'read'})==='granted'){
        try{return openJam(await handle.getFile())}catch(e){await DB.del('handle')}
      }
      /* Permission expired — needs one tap to re-grant */
      pending=async()=>{
        try{
          const p=await handle.requestPermission({mode:'read'});
          if(p==='granted'){openJam(await handle.getFile())}else throw 0;
        }catch(e){await DB.del('handle');pending=pick;show();}
      };
      return show();
    }catch(e){await DB.del('handle')}
  }

  /* 2 — Try stored file content (fallback for non-FSA browsers) */
  const buf=await DB.get('buf');
  if(buf) return openJam(new File([buf],await DB.get('name')||'app.jam'));

  /* 3 — Nothing stored — prompt user */
  pending=pick;show();
}

/* Click the hint (or anywhere — it covers the viewport) to trigger pending action */
el.onclick=()=>{el.classList.remove('show');if(pending){const a=pending;pending=null;a();}};

/* Ctrl+Shift+J — clear stored data and pick a new file */
document.addEventListener('keydown',async e=>{
  if(e.ctrlKey&&e.shiftKey&&e.key==='J'){
    e.preventDefault();
    await DB.del('handle');await DB.del('buf');await DB.del('name');
    pending=pick;show();
  }
});

init();
